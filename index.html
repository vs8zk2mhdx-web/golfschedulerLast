    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--green-dark)">
          📅 ${esc(weekLabel(futureWeekEditing))}
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:2px">
          Pre-entering absences and constraints for this future week
        </div>
      </div>
      <button class="btn-ghost dark btn-sm" onclick="closeFutureWeek()">← Back to Current Week</button>
    </div>
    ${setupHtml}
  `;
}

// ── ROSTER DROPDOWN ───────────────────────────────────────────────────────
function toggleRosterMenu() {
  const menu = document.getElementById('rosterMenu');
  const isOpen = menu.classList.contains('open');
  // Close future menu if open
  document.getElementById('futureMenu')?.classList.remove('open');
  if (isOpen) { menu.classList.remove('open'); return; }
  menu.classList.add('open');
}

// Close roster dropdown when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('rosterDropdown')?.contains(e.target)) {
    document.getElementById('rosterMenu')?.classList.remove('open');
  }
});

// ── RENDER: VIEW ROSTER ────────────────────────────────────────────────────
function renderViewRoster() {
  const fullRoster = (state.customRoster && state.customRoster.length)
    ? state.customRoster.map(p => ({ ...p, name: cleanName(p.name) }))
    : ROSTER;
  if (!fullRoster.length) return `<div style="padding:40px;text-align:center;color:var(--text-muted)">No roster loaded. Upload a CSV to get started.</div>`;

  // Sort: active players by carpool group (nulls last), then deleted at bottom
  const sorted = [...fullRoster].sort((a, b) => {
    if (a.deleted && !b.deleted) return 1;
    if (!a.deleted && b.deleted) return -1;
    const ca = a.carpool ?? 999, cb = b.carpool ?? 999;
    if (ca !== cb) return ca - cb;
    return a.name.localeCompare(b.name);
  });

  const rows = sorted.map(p => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;
                border-bottom:1px solid #f0f0f0;${p.deleted ? 'opacity:0.45;background:#fdf5f5;' : ''}">
      ${p.carpool
        ? `<span class="cp-tag">CP${p.carpool}</span>`
        : `<span style="display:inline-block;min-width:34px"></span>`}
      <span style="flex:1;font-size:14px">${esc(p.name)}</span>
      <span style="font-size:12px;color:var(--text-muted);min-width:40px">${p.holes}-hole</span>
      ${p.deleted ? `<span style="font-size:11px;font-weight:700;color:var(--danger);background:var(--danger-bg);padding:2px 8px;border-radius:10px;">INACTIVE</span>` : ''}
    </div>`).join('');

  const active = fullRoster.filter(p => !p.deleted).length;
  const inactive = fullRoster.filter(p => p.deleted).length;

  return `
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
                color:var(--green-dark);margin-bottom:4px">Roster</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
      ${active} active · ${inactive} inactive · sorted by carpool group
    </div>
    <div class="card">
      <div class="card-header">All Players</div>
      ${rows}
    </div>`;
}

// ── RENDER: MANAGE GROUPS ──────────────────────────────────────────────────
function renderManageGroups() {
  const fullRoster = (state.customRoster && state.customRoster.length)
    ? state.customRoster.map(p => ({ ...p, name: cleanName(p.name) }))
    : ROSTER;
  if (!fullRoster.length) return `<div style="padding:40px;text-align:center;color:var(--text-muted)">No roster loaded.</div>`;

  const active = fullRoster.filter(p => !p.deleted);
  const sorted = [...active].sort((a, b) => {
    const ca = a.carpool ?? 999, cb = b.carpool ?? 999;
    if (ca !== cb) return ca - cb;
    return a.name.localeCompare(b.name);
  });

  // Find currently used group numbers to show as hint
  const usedGroups = [...new Set(active.map(p => p.carpool).filter(Boolean))].sort((a,b) => a-b);

  const rows = sorted.map((p, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #f0f0f0;">
      <span style="flex:1;font-size:14px">${esc(p.name)}</span>
      <span style="font-size:12px;color:var(--text-muted);min-width:40px">${p.holes}-hole</span>
      <input type="number" min="1" max="99"
        id="cpInput_${i}"
        data-name="${esc(p.name)}"
        value="${p.carpool || ''}"
        placeholder="None"
        style="width:72px;padding:4px 8px;border:1.5px solid var(--border);border-radius:5px;
               font-size:13px;font-family:inherit;text-align:center;"
        oninput="markGroupsDirty()">
    </div>`).join('');

  return `
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
                color:var(--green-dark);margin-bottom:4px">Manage Carpool Groups</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
      Edit group numbers then click Save. Groups currently in use: <strong>${usedGroups.length ? usedGroups.join(', ') : 'none'}</strong>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">Active Players — Carpool Group</div>
      ${rows}
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn-primary" onclick="saveGroupChanges()">💾 Save Changes</button>
      <span id="groupsDirtyMsg" style="font-size:13px;color:var(--text-muted);display:none">Unsaved changes</span>
    </div>`;
}

function markGroupsDirty() {
  const msg = document.getElementById('groupsDirtyMsg');
  if (msg) msg.style.display = 'inline';
}

function saveGroupChanges() {
  if (!state.customRoster) state.customRoster = [...ROSTER];
  // Read all input fields
  const inputs = document.querySelectorAll('[id^="cpInput_"]');
  inputs.forEach(input => {
    const name = input.dataset.name;
    const val = input.value.trim();
    const cp = val ? (parseInt(val) || null) : null;
    const player = state.customRoster.find(p => cleanName(p.name) === name);
    if (player) player.carpool = cp;
  });
  restoreCustomRoster();
  currentAssignments = null;
  saveToStorage();
  showToast('Carpool groups saved');
  const msg = document.getElementById('groupsDirtyMsg');
  if (msg) msg.style.display = 'none';
}

// ── RENDER: DELETE PERSON ──────────────────────────────────────────────────
function renderDeletePerson() {
  return `
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
                color:var(--green-dark);margin-bottom:4px">Delete Person</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
      Deleted players are marked inactive and hidden from weekly setup. Their history is preserved.
    </div>
    <div class="card" style="max-width:480px">
      <div class="card-header">Find Player</div>
      <div class="card-body">
        <input type="text" id="deleteSearch" placeholder="Type a name to search…"
          oninput="renderDeleteResults()"
          style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;
                 font-size:14px;font-family:inherit;margin-bottom:12px;">
        <div id="deleteResults"></div>
      </div>
    </div>`;
}

function renderDeleteResults() {
  const q = (document.getElementById('deleteSearch')?.value || '').toLowerCase().trim();
  const container = document.getElementById('deleteResults');
  if (!container) return;
  if (!q) { container.innerHTML = ''; return; }

  const fullRoster = state.customRoster && state.customRoster.length
    ? state.customRoster.map(p => ({ ...p, name: cleanName(p.name) }))
    : ROSTER;

  const matches = fullRoster.filter(p => p.name.toLowerCase().includes(q));
  if (!matches.length) {
    container.innerHTML = `<div style="color:var(--text-muted);font-size:13px">No players found</div>`;
    return;
  }
  container.innerHTML = matches.map(p => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;">
      <span style="flex:1;font-size:14px;${p.deleted ? 'opacity:0.5' : ''}">${esc(p.name)}
        ${p.deleted ? '<em style="font-size:11px;color:var(--danger)"> (inactive)</em>' : ''}
      </span>
      ${p.deleted
        ? `<button class="btn-ghost dark btn-sm" onclick="undeletePlayer('${esc(p.name)}')">Restore</button>`
        : `<button class="btn-danger btn-sm" onclick="confirmDeletePlayer('${esc(p.name)}')">Delete</button>`
      }
    </div>`).join('');
}

function confirmDeletePlayer(name) {
  if (!confirm(`Mark "${name}" as inactive? They will be hidden from weekly setup but their history is preserved. You can restore them later.`)) return;
  if (!state.customRoster) state.customRoster = [...ROSTER];
  const p = state.customRoster.find(p => cleanName(p.name) === name);
  if (p) { p.deleted = true; }
  restoreCustomRoster();
  currentAssignments = null;
  saveToStorage();
  showToast(`${name} marked inactive`);
  renderDeleteResults();
}

function undeletePlayer(name) {
  if (!state.customRoster) return;
  const p = state.customRoster.find(p => cleanName(p.name) === name);
  if (p) { p.deleted = false; }
  restoreCustomRoster();
  saveToStorage();
  showToast(`${name} restored to active roster`);
  renderDeleteResults();
}

// ── INIT ──────────────────────────────────────────────────────────────────
initStorage().then(() => {
  restoreCustomRoster();
  TEE_TIMES = buildTeeTimes(state.seasonTeeTime || '08:30');
  render();
  // Prompt for season start date if not yet set
  if (ROSTER.length && !state.seasonStartDate) {
    setTimeout(() => showSeasonStartDateModal(false), 400);
  }
});
</script>
</body>
</html>
