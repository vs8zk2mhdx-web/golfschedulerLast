<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladies Golf League · Pairs — Tee Time Scheduler (Pairs)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark:  #1a3a2a;
  --green-mid:   #2d5a3d;
  --green-light: #3d7a52;
  --gold:        #c9a84c;
  --gold-light:  #f0d080;
  --blue:        #3a7abf;
  --blue-light:  #d0e8ff;
  --danger:      #c0392b;
  --danger-bg:   #fdecea;
  --text:        #1a1a1a;
  --text-muted:  #666;
  --bg:          #f5f3ee;
  --card-bg:     #ffffff;
  --border:      #ddd;
  --shadow:      0 2px 8px rgba(0,0,0,0.08);
}
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 28px; }
.logo h1 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
.logo p  { font-size: 12px; opacity: 0.75; letter-spacing: 0.5px; text-transform: uppercase; }
.week-badge {
  background: var(--gold);
  color: var(--green-dark);
  font-weight: 700;
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

/* ── Data Bar ────────────────────────────────────────────────────────────── */
.data-bar {
  background: var(--green-dark);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.data-bar span { color: rgba(255,255,255,0.6); font-size: 12px; letter-spacing: 0.5px; margin-right: 4px; }

/* ── Navigation ──────────────────────────────────────────────────────────── */
nav {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 0 20px;
  display: flex;
  gap: 0;
}
.nav-btn {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 12px 20px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: -2px;
}
.nav-btn:hover { color: var(--green-mid); }
.nav-btn.active { color: var(--green-dark); border-bottom-color: var(--green-mid); font-weight: 600; }

/* ── Main ────────────────────────────────────────────────────────────────── */
main { max-width: 860px; margin: 0 auto; padding: 20px; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
button { cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: all 0.15s; border: none; }
.btn-primary {
  background: var(--green-mid);
  color: white;
  padding: 8px 18px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
}
.btn-primary:hover { background: var(--green-dark); }
.btn-ghost {
  background: rgba(255,255,255,0.12);
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 6px 12px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 500;
}
.btn-ghost:hover { background: rgba(255,255,255,0.22); }
.btn-ghost.dark {
  background: transparent;
  color: var(--green-mid);
  border: 1.5px solid var(--border);
  font-size: 13px;
}
.btn-ghost.dark:hover { background: var(--bg); border-color: var(--green-mid); }
.btn-ghost.dark.active {
  background: var(--green-mid);
  color: white;
  border-color: var(--green-mid);
}
.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1.5px solid #f5c0bc;
  padding: 6px 12px;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 600;
}
.btn-danger:hover { background: #fbd5d3; }
.btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 4px; }
.btn-lg { padding: 11px 28px; font-size: 15px; border-radius: 7px; }

/* ── Cards & Sections ────────────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
}
.card-header {
  background: linear-gradient(90deg, var(--green-dark), var(--green-mid));
  color: white;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.card-body { padding: 14px 16px; }
.section-divider {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── Stats Grid ──────────────────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card-bg);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--green-mid); line-height: 1; }
.stat-num.red { color: var(--danger); }
.stat-num.blue { color: var(--blue); }
.stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

/* ── Player Rows ─────────────────────────────────────────────────────────── */
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}
.player-row:hover { background: #f8faf8; }
.player-row.absent { opacity: 0.5; background: #fdf5f5; }
.player-row.expanded { background: #f0f8f0; }
.hole-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  min-width: 28px;
  text-align: center;
}
.hole-tag.h18 { background: #fff3cd; color: #856404; }
.hole-tag.h9  { background: #d0e8ff; color: #0d5a9a; }
.cp-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  background: #e8f5e9;
  color: var(--green-dark);
  min-width: 34px;
  text-align: center;
}
.player-name { flex: 1; font-size: 14px; }
.badge-out {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--danger-bg);
  color: var(--danger);
  letter-spacing: 0.3px;
}
.badge-req {
  font-size: 13px;
  color: var(--gold);
}
.chevron { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

/* ── Expand Panel ────────────────────────────────────────────────────────── */
.expand-panel {
  padding: 12px 16px 14px 48px;
  background: #f7fbf7;
  border-bottom: 1px solid #e0ece0;
}
.expand-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.time-row label { font-size: 12px; color: var(--text-muted); }
.time-input {
  border: 1.5px solid var(--border);
  border-radius: 5px;
  padding: 5px 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: white;
  width: 120px;
}
.time-input:focus { outline: none; border-color: var(--green-mid); }
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  margin-top: 4px;
}
.checkbox-label input { width: 15px; height: 15px; cursor: pointer; }
.search-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  margin-bottom: 0;
  background: white;
}
.search-input:focus { outline: none; border-color: var(--green-mid); }

/* ── Generate Bar ────────────────────────────────────────────────────────── */
.generate-bar {
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
}
.generate-hint { font-size: 13px; color: var(--text-muted); }

/* ── Tee Sheet ───────────────────────────────────────────────────────────── */
.tee-sheet-header {
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.tee-sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green-dark); }
.tee-sheet-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.tee-sheet-actions { display: flex; gap: 8px; align-items: center; }

.constraint-box {
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 14px 18px;
  margin-bottom: 14px;
  font-size: 13px;
}
.constraint-box h4 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.constraint-section { margin-bottom: 12px; }
.constraint-section:last-child { margin-bottom: 0; }
.constraint-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.chip-absent  { background: var(--danger-bg); color: var(--danger); }
.chip-req     { background: #e8f0fe; color: #1a56c4; }
.chip-split   { background: #f3e8ff; color: #6b21a8; }
.constraint-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.constraint-name { font-weight: 600; color: var(--text); min-width: 160px; }
.constraint-detail { color: var(--text-muted); }

.tee-slots { display: grid; gap: 8px; margin-bottom: 16px; }
.tee-slot {
  background: var(--card-bg);
  border-radius: 8px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: hidden;
}
.slot-time {
  padding: 12px 14px;
  font-weight: 700;
  font-size: 14px;
  min-width: 110px;
  text-align: center;
  color: white;
}
.slot-time.h18 { background: linear-gradient(135deg, #b8860b, #d4a017); }
.slot-time.h9  { background: linear-gradient(135deg, #1a6baf, #2980b9); }
.slot-sub { font-size: 10px; font-weight: 400; opacity: 0.85; }
.slot-players { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; flex: 1; }
.player-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 3px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.player-chip .cp { font-size: 10px; font-weight: 600; color: var(--green-mid); }
.player-chip { cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.player-chip:hover { background: #e8f4e8; border-color: var(--green-light); }
.player-chip.swap-selected {
  background: var(--gold-light); border-color: var(--gold);
  font-weight: 600; box-shadow: 0 0 0 2px var(--gold);
}
.slot-empty-target {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border: 1.5px dashed var(--border); border-radius: 14px;
  font-size: 12px; color: var(--text-muted); cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.slot-empty-target:hover, .slot-empty-target.swap-selected {
  background: var(--gold-light); border-color: var(--gold); color: var(--text);
}
.swap-hint {
  font-size: 12px; color: var(--gold); font-weight: 600;
  text-align: center; padding: 6px; margin-bottom: 4px;
  animation: pulse 1.2s infinite;
}
.commit-note {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  padding: 10px;
  margin-bottom: 16px;
}

/* ── History ─────────────────────────────────────────────────────────────── */
.pair-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #f5f5f5;
  font-size: 13px;
}
.pair-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  min-width: 30px;
  text-align: center;
}
.pair-badge.c1 { background: #e8f5e9; color: var(--green-mid); }
.pair-badge.c2 { background: #fff3cd; color: #856404; }
.pair-badge.c3 { background: var(--danger-bg); color: var(--danger); }
.week-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #f5f5f5;
  font-size: 13px;
}
.week-row span:first-child { font-weight: 600; }

/* ── Sync Indicator ──────────────────────────────────────────────────────── */
.sync-indicator {
  width: 10px; height: 10px; border-radius: 50%;
  background: #888; transition: background 0.3s;
}
.sync-indicator.synced  { background: #4caf50; }
.sync-indicator.syncing { background: var(--gold); animation: pulse 1s infinite; }
.sync-indicator.error   { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Modal overlay ───────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal-box {
  background: white; border-radius: 12px; padding: 28px 32px;
  max-width: 460px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.modal-title {
  font-family: 'Playfair Display',serif; font-size: 20px; font-weight: 700;
  color: var(--green-dark); margin-bottom: 10px;
}
.modal-body { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 20px; }
.modal-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 6px;
  padding: 8px 12px; font-size: 13px; font-family: 'Source Sans 3',sans-serif;
  margin-bottom: 14px;
}
.modal-input:focus { outline: none; border-color: var(--green-mid); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green-dark);
  color: white;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Future Weeks Dropdown ───────────────────────────────────────────────── */
.nav-dropdown { position: relative; display: inline-block; }
.dropdown-menu {
  display: none; position: absolute; top: 100%; left: 0;
  background: white; border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 220px; z-index: 200;
  padding: 6px 0; margin-top: 4px;
}
.dropdown-menu.open { display: block; }
.dropdown-item {
  display: block; width: 100%; text-align: left; padding: 9px 16px;
  background: none; border: none; font-size: 13px; font-family: inherit;
  color: var(--text); cursor: pointer; white-space: nowrap;
}
.dropdown-item:hover { background: var(--bg); }
.dropdown-item.has-data { font-weight: 600; color: var(--green-mid); }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  main { padding: 12px; }
  .stats-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .tee-sheet-actions { flex-wrap: wrap; }
  .tee-sheet-header { flex-direction: column; gap: 10px; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⛳</div>
    <div class="logo-text">
      <h1>Ladies Golf League · Pairs</h1>
      <p>Tee Time Scheduler</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="sync-indicator" id="syncIndicator" title="Sync status"></div>
    <button id="refreshBtn" onclick="refreshFromCloud()"
            style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.5);
                   color:white;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;
                   cursor:pointer;white-space:nowrap;transition:background 0.2s;"
            onmouseover="this.style.background='rgba(255,255,255,0.25)'"
            onmouseout="this.style.background='rgba(255,255,255,0.15)'">
      ☁️ Refresh
    </button>
    <div class="week-badge" id="weekBadge">Week 1</div>
  </div>
</header>

<div class="data-bar">
  <span>Season Data:</span>
  <button class="btn-ghost btn-sm" onclick="confirmNewSeason()">🔄 New Season</button>
  <button class="btn-ghost btn-sm" onclick="document.getElementById('rosterFile').click()">📋 Upload Roster</button>
  <input type="file" id="rosterFile" accept=".csv" style="display:none" onchange="uploadRoster(event)">
  <button class="btn-ghost btn-sm" onclick="showConfigureSync()" style="margin-left:auto">⚙️ Configure Sync</button>
</div>

<nav>
  <button class="nav-btn active" id="nav-setup"    onclick="showScreen('setup')">Weekly Setup</button>
  <button class="nav-btn"        id="nav-schedule" onclick="showScreen('schedule')">Current Tee Sheet</button>
  <button class="nav-btn"        id="nav-history"  onclick="showScreen('history')">Tee Sheets and History</button>
  <div class="nav-dropdown" id="futureWeeksDropdown">
    <button class="nav-btn" id="nav-future" onclick="toggleFutureMenu()">Future Weeks ▾</button>
    <div class="dropdown-menu" id="futureMenu"></div>
  </div>
  <div class="nav-dropdown" id="rosterDropdown">
    <button class="nav-btn" id="nav-roster" onclick="toggleRosterMenu()">Roster ▾</button>
    <div class="dropdown-menu" id="rosterMenu">
      <button class="dropdown-item" onclick="showScreen('viewRoster');document.getElementById('rosterMenu').classList.remove('open')">👁 View Roster</button>
      <button class="dropdown-item" onclick="downloadCurrentRoster();document.getElementById('rosterMenu').classList.remove('open')">⬇ Download Roster</button>
      <button class="dropdown-item" onclick="showScreen('manageGroups');document.getElementById('rosterMenu').classList.remove('open')">🚗 Manage Groups</button>
      <button class="dropdown-item" onclick="showAddPlayerModal();document.getElementById('rosterMenu').classList.remove('open')">+ Add Person</button>
      <button class="dropdown-item" onclick="showScreen('deletePerson');document.getElementById('rosterMenu').classList.remove('open')">✕ Delete Person</button>
    </div>
  </div>
</nav>

<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────
const STORAGE_VERSION = '17';

// ── Name cleaning ─────────────────────────────────────────────────────────
function cleanName(s) {
  return String(s).replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
}

// ── Date helpers ──────────────────────────────────────────────────────────
// Returns a Date object for week N (1-based) given a season start ISO string
function weekDate(weekNum) {
  if (!state.seasonStartDate) return null;
  const d = new Date(state.seasonStartDate + 'T12:00:00');
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}

function formatWeekDate(weekNum) {
  const d = weekDate(weekNum);
  if (!d) return `Week ${weekNum}`;
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function weekLabel(weekNum) {
  return `Week ${weekNum}${state.seasonStartDate ? ' — ' + formatWeekDate(weekNum) : ''}`;
}

function dateSlug(weekNum) {
  const d = weekDate(weekNum);
  if (!d) return `week${weekNum}`;
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    .toLowerCase().replace(/,/g,'').replace(/\s+/g,'-');
}

// ── Roster ────────────────────────────────────────────────────────────────
let ROSTER_RAW = [];
let ROSTER     = [];

// ── Tee Times ─────────────────────────────────────────────────────────────
let TEE_TIMES = [];

function buildTeeTimes(startTimeStr) {
  // startTimeStr: "HH:MM" e.g. "08:30". Defaults to "08:30" if absent.
  const [sh, sm] = (startTimeStr || '08:30').split(':').map(Number);
  const times = [];
  let h = sh, m = sm;
  while (h < 12) {
    times.push({ index: times.length, mins: h * 60 + m,
      label: `${h}:${String(m).padStart(2,'0')}` });
    m += 8; if (m >= 60) { m -= 60; h++; }
    if (h === 11 && m > 45) break;
  }
  return times;
}

TEE_TIMES = buildTeeTimes('08:30'); // overwritten after state loads

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  weekNum: 1,
  seasonStartDate: null, // ISO date string "YYYY-MM-DD" for week 1
  seasonTeeTime:   null, // "HH:MM" start time, e.g. "08:30"
  pairingHistory: {},    // "NameA|NameB" -> count
  weeklyHistory: [],     // [{week, date, count, ...}]
  futureWeeks: {}        // weekNum -> {optOuts, specialRequests}
};
let weekly = {
  optOuts: {},           // name -> true
  specialRequests: {}    // name -> {type, time?, carpoolSplit?}
};
let currentAssignments = null;
let swapSelection = null; // {slotIdx, playerIdx} or {slotIdx, empty:true}
let expandedPlayer    = null;
let searchTerm        = '';
let currentScreen     = 'setup';

// ── Persistence ───────────────────────────────────────────────────────────
// Two modes:
//   1. JSONBin sync (shared between users) — when BIN_ID and API_KEY are set
//   2. localStorage only (single-user fallback)
//
// JSONBin.io is a free JSON storage service. Each "bin" is a small JSON
// document accessible via a URL. Both users point to the same bin.

let BIN_ID  = '';   // e.g. "64abc123..."  — from jsonbin.io bin URL
let API_KEY = '';   // X-Master-Key from jsonbin.io account
let syncTimer = null;

const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b';

function setSyncStatus(status) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  el.className = 'sync-indicator ' + status;
  el.title = {
    synced:  'Synced with JSONBin',
    syncing: 'Saving…',
    error:   'Sync error — data saved locally',
    '':      'Not configured — data saved locally only'
  }[status] || '';
}

// ── localStorage (always used as local cache) ─────────────────────────────
function saveLocal() {
  try {
    localStorage.setItem('golf_version', STORAGE_VERSION);
    localStorage.setItem('golf_state',   JSON.stringify(state));
    localStorage.setItem('golf_weekly',  JSON.stringify(weekly));
    // Save credentials under version-independent keys
    localStorage.setItem('golf_credentials_bin', BIN_ID);
    localStorage.setItem('golf_credentials_key', API_KEY);
  } catch(e) { console.warn('Local save failed:', e); }
}

function loadLocal() {
  try {
    // Credentials live under version-independent keys so they survive
    // every storage version bump and are NEVER wiped automatically.
    const credBin = localStorage.getItem('golf_credentials_bin');
    const credKey = localStorage.getItem('golf_credentials_key');
    if (credBin) BIN_ID  = credBin;
    if (credKey) API_KEY = credKey;

    // State data is version-gated — cleared on upgrade to avoid schema mismatches
    if (localStorage.getItem('golf_version') !== STORAGE_VERSION) {
      ['golf_state','golf_weekly','golf_bin_id','golf_api_key'].forEach(k => localStorage.removeItem(k));
      localStorage.setItem('golf_version', STORAGE_VERSION);
      return; // start fresh — credentials already loaded above
    }
    const s = localStorage.getItem('golf_state');
    const w = localStorage.getItem('golf_weekly');
    if (s) state  = JSON.parse(s);
    if (w) weekly = JSON.parse(w);
  } catch(e) { console.warn('Local load failed:', e); }
}

// ── JSONBin sync ──────────────────────────────────────────────────────────
async function syncToJSONBin() {
  if (!BIN_ID || !API_KEY) return;
  setSyncStatus('syncing');
  try {
    const resp = await fetch(`${JSONBIN_BASE}/${BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify({ state: JSON.stringify(state), weekly: JSON.stringify(weekly) })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    setSyncStatus('synced');
  } catch(e) {
    console.warn('JSONBin sync failed:', e);
    setSyncStatus('error');
  }
}

async function loadFromJSONBin() {
  if (!BIN_ID || !API_KEY) return false;
  setSyncStatus('syncing');
  try {
    const resp = await fetch(`${JSONBIN_BASE}/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    const data = json.record;

    // Safely parse state — guard against empty string or missing field
    if (data.state && typeof data.state === 'string' && data.state.trim()) {
      try { state = JSON.parse(data.state); } catch(pe) { console.warn('state parse failed:', pe); }
    }

    // Safely parse weekly — always ensure valid structure with both required keys
    if (data.weekly && typeof data.weekly === 'string' && data.weekly.trim()) {
      try {
        const parsed = JSON.parse(data.weekly);
        weekly = {
          optOuts:         parsed.optOuts         || {},
          specialRequests: parsed.specialRequests || {}
        };
      } catch(pe) {
        console.warn('weekly parse failed:', pe);
        weekly = { optOuts: {}, specialRequests: {} };
      }
    } else {
      weekly = { optOuts: {}, specialRequests: {} };
    }

    // Ensure state always has required keys
    if (!state.pairingHistory) state.pairingHistory = {};
    if (!state.weeklyHistory)  state.weeklyHistory  = [];
    if (!state.futureWeeks)    state.futureWeeks    = {};
    if (!state.weekNum)        state.weekNum        = 1;

    saveLocal();
    setSyncStatus('synced');
    return true;
  } catch(e) {
    console.warn('JSONBin load failed, using local data:', e);
    setSyncStatus('error');
    return false;
  }
}

// ── Manual refresh from cloud ─────────────────────────────────────────────
async function refreshFromCloud() {
  if (!BIN_ID || !API_KEY) {
    showToast('Sync not configured — use ⚙️ Configure Sync first');
    return;
  }
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.textContent = '☁️ Refreshing…';
  const ok = await loadFromJSONBin();
  if (btn) btn.textContent = '☁️ Refresh from Cloud';
  if (ok) {
    restoreCustomRoster();
    TEE_TIMES = buildTeeTimes(state.seasonTeeTime || '08:30');
    swapSelection = null;
    currentAssignments = null;
    render();
    showToast('Data refreshed from cloud ✓');
  } else {
    showToast('Could not reach cloud — check your connection');
  }
}

// ── Public save/load used by the rest of the app ──────────────────────────
function saveToStorage() {
  saveLocal();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncToJSONBin(), 800);
}

async function initStorage() {
  loadLocal();
  if (BIN_ID && API_KEY) {
    const loaded = await loadFromJSONBin();
    if (loaded) {
      restoreCustomRoster();
      render();
    }
  } else {
    setSyncStatus('');
  }
}

}

async function saveSyncConfig() {
  const binId  = document.getElementById('binIdInput').value.trim();
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!binId || !apiKey) { showToast('Please enter both the Bin ID and API Key'); return; }
  BIN_ID  = binId;
  API_KEY = apiKey;
  saveLocal();
  document.querySelector('.modal-overlay')?.remove();
  showToast('Testing connection…');
  const ok = await loadFromJSONBin();
  if (ok) {
    restoreCustomRoster();
    render();
    showToast('Connected! Data loaded from JSONBin.');
  } else {
    showToast('Could not connect — check your Bin ID and API Key.');
  }

function exportData() {
  const blob = new Blob([JSON.stringify({ state, weekly, exportedAt: new Date().toISOString() }, null, 2)],
    { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `golf-league-${dateSlug(state.weekNum)}-backup.json`;
  a.click();
  showToast('Backup saved!');
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.state)  state  = data.state;
      if (data.weekly) weekly = data.weekly;
      currentAssignments = null;
      expandedPlayer = null;
      saveToStorage();
      restoreCustomRoster();
      render();
      showToast('Backup loaded!');
    } catch { showToast('Error reading backup file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  const dateVal = document.getElementById('seasonDateInput').value;
  const timeVal = document.getElementById('seasonTeeInput').value || '08:30';
  if (!dateVal) { showToast('Please select a date'); return; }
  document.querySelector('.modal-overlay')?.remove();
  if (isNewSeason) {
    state  = { weekNum: 1, seasonStartDate: dateVal, seasonTeeTime: timeVal,
               pairingHistory: {}, weeklyHistory: [], futureWeeks: {} };

    expandedPlayer = null;
  } else {
    state.seasonStartDate = dateVal;
    state.seasonTeeTime   = timeVal;

// ── Utilities ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Safe raw name storage in data attribute (only double-quotes need escaping for HTML attr)
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  return `${h}:${String(m).padStart(2,'0')} AM`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Screen routing ────────────────────────────────────────────────────────
function showScreen(name) {
  // If leaving the future week view via a nav button, auto-save and clean up
  if (futureWeekEditing && name !== 'future') {
    saveFutureWeekData();
    showToast(`${weekLabel(futureWeekEditing)} saved automatically`);
    futureWeekEditing = null;
    futureEdit = { optOuts: {}, specialRequests: {} };
  }
  currentScreen = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  // Roster sub-screens highlight the Roster dropdown button
  const rosterScreens = ['viewRoster', 'manageGroups', 'deletePerson'];
  const navId = rosterScreens.includes(name) ? 'nav-roster' : 'nav-' + name;
  const navBtn = document.getElementById(navId);
  if (navBtn) navBtn.classList.add('active');
  render();
}

function render() {
  document.getElementById('weekBadge').textContent = weekLabel(state.weekNum);
  const main = document.getElementById('main');
  if      (currentScreen === 'setup')        main.innerHTML = renderSetup();
  else if (currentScreen === 'schedule')     main.innerHTML = renderSchedule();
  else if (currentScreen === 'future')       main.innerHTML = renderFutureWeek();
  else if (currentScreen === 'viewRoster')   main.innerHTML = renderViewRoster();
  else if (currentScreen === 'manageGroups') main.innerHTML = renderManageGroups();
  else if (currentScreen === 'deletePerson') main.innerHTML = renderDeletePerson();
  else                                        main.innerHTML = renderHistory();
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────
// All handlers receive the raw player name via data-rawname attribute

function toggleExpand(rawName) {
  expandedPlayer = expandedPlayer === rawName ? null : rawName;
  render();
}

function toggleOut(rawName) {
  const w = futureWeekEditing ? futureEdit : weekly;
  if (w.optOuts[rawName]) delete w.optOuts[rawName];
  else                     w.optOuts[rawName] = true;
  if (w.optOuts[rawName]) delete w.specialRequests[rawName];
  if (futureWeekEditing) saveFutureWeekData();
  else currentAssignments = null;
  saveToStorage();
  render();
}

function setReqType(rawName, type) {
  const w = futureWeekEditing ? futureEdit : weekly;
  if (!type) {
    delete w.specialRequests[rawName];
  } else {
    w.specialRequests[rawName] = { ...(w.specialRequests[rawName] || {}), type };
  }
  if (futureWeekEditing) saveFutureWeekData();
  else currentAssignments = null;
  saveToStorage();
  render();
}

function setReqTime(rawName, val) {
  const w = futureWeekEditing ? futureEdit : weekly;
  w.specialRequests[rawName] = { ...(w.specialRequests[rawName] || {}), time: val };
  if (futureWeekEditing) saveFutureWeekData();
  else currentAssignments = null;
  saveToStorage();
  // No re-render: avoids destroying the time input mid-typing
}

function setReqSplit(rawName, checked) {
  const w = futureWeekEditing ? futureEdit : weekly;
  w.specialRequests[rawName] = { ...(w.specialRequests[rawName] || {}), carpoolSplit: checked };
  if (futureWeekEditing) saveFutureWeekData();
  else currentAssignments = null;
  saveToStorage();
  render();
}

function setSearch(val) {
  searchTerm = val;
  render();
}

// ── RENDER: SETUP SCREEN ──────────────────────────────────────────────────
function renderSetup() {
  return renderSetupContent(false);
}

function renderSetupContent(isFuture) {
  // No roster loaded yet
  if (!ROSTER.length) {
    return `<div style="padding:40px;text-align:center;">
      <div style="font-size:48px;margin-bottom:16px">📋</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
                  color:var(--green-dark);margin-bottom:10px">No Roster Loaded</div>
      <div style="font-size:14px;color:var(--text-muted);max-width:360px;margin:0 auto 24px;line-height:1.6">

        <strong>⬇ Roster Template</strong> button in the bar above to download
        a blank template, fill it in, then upload it with
        <strong>📋 Upload Roster</strong>.
      </div>
      <div style="font-size:13px;color:var(--text-muted);background:var(--bg);
                  border-radius:8px;padding:14px 20px;display:inline-block;text-align:left;">
        <strong>CSV format:</strong><br>
        Name, Holes, Carpool<br>
        Alice Smith, 18,<br>
        Bob Jones, 9, 1<br>
        Carol Lee, 9, 1
      </div>
    </div>`;
  }

  const roster18 = ROSTER.filter(p => p.holes === 18);
  const roster9  = ROSTER.filter(p => p.holes === 9);
  const term = searchTerm.toLowerCase();
  const f18 = roster18.filter(p => p.name.toLowerCase().includes(term));
  const f9  = roster9.filter(p => p.name.toLowerCase().includes(term));

  function playerRow(p) {
    const isOut = !!weekly.optOuts[p.name];
    const isExp = expandedPlayer === p.name;
    const req   = weekly.specialRequests[p.name];
    const hasReq = req && req.type;
    const rn = escAttr(p.name);
    return `
      <div class="player-row${isOut?' absent':''}${isExp?' expanded':''}"
           onclick="toggleExpand(this.dataset.rawname)"
           data-rawname="${rn}">
        <span class="hole-tag h${p.holes}">${p.holes}</span>
        ${p.carpool ? `<span class="cp-tag">CP${p.carpool}</span>` : '<span style="display:inline-block;min-width:34px"></span>'}
        <span class="player-name">${esc(p.name)}</span>
        <span style="display:flex;gap:5px;align-items:center">
          ${isOut  ? '<span class="badge-out">OUT</span>' : ''}
          ${hasReq ? '<span class="badge-req">★</span>' : ''}
        </span>
        <span class="chevron">${isExp ? '▲' : '▼'}</span>
      </div>
      ${isExp ? renderExpand(p) : ''}
    `;
  }

  const TYPE_LABELS = { not_before:'Not Before', not_after:'Not After', early:'Early', late:'Late' };

  function renderExpand(p) {
    const isOut = !!weekly.optOuts[p.name];
    const req   = weekly.specialRequests[p.name] || {};
    const rn    = escAttr(p.name);
    const needsTime = req.type === 'not_before' || req.type === 'not_after';
    return `
      <div class="expand-panel" data-rawname="${rn}">
        <div class="btn-group">
          <button class="btn-${isOut ? 'danger' : 'ghost dark'} btn-sm"
                  onclick="toggleOut(this.closest('[data-rawname]').dataset.rawname)">
            ${isOut ? '✓ Absent — Click to Reinstate' : 'Mark Absent This Week'}
          </button>
        </div>
        ${!isOut ? `
          <div class="expand-label" style="margin-top:8px">Special Tee Time Request:</div>
          <div class="btn-group">
            <button class="btn-ghost dark btn-sm${!req.type?' active':''}"
                    onclick="setReqType(this.closest('[data-rawname]').dataset.rawname,'')">None</button>
            ${['early','late','not_before','not_after'].map(t => `
              <button class="btn-ghost dark btn-sm${req.type===t?' active':''}"

                ${TYPE_LABELS[t]}

          ` : ''}
        ` : ''}
      </div>
    `;
  }

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${active.length}</div><div class="stat-label">Playing</div></div>
      <div class="stat-card"><div class="stat-num red">${absent}</div><div class="stat-label">Absent</div></div>
      <div class="stat-card"><div class="stat-num blue">${reqCount}</div><div class="stat-label">Requests</div></div>
    </div>

      <div class="card-body" style="padding-bottom:8px">

               oninput="setSearch(this.value)">
      </div>
      <div class="section-divider">● 18-Hole Players (${roster18.length})</div>
      ${f18.map(playerRow).join('') || '<div style="padding:10px 16px;color:var(--text-muted);font-size:13px">No matches</div>'}
      <div class="section-divider">● 9-Hole Players (${roster9.length})</div>
      ${f9.map(playerRow).join('') || '<div style="padding:10px 16px;color:var(--text-muted);font-size:13px">No matches</div>'}
    </div>
    <div class="generate-bar">
      ${isFuture
        ? `<button class="btn-primary btn-lg" onclick="closeFutureWeek()">✓ Done — Save & Return</button>`
        : `<button class="btn-primary btn-lg" onclick="doGenerate()">⛳ Generate Tee Sheet</button>`
      }

// ── RENDER: SCHEDULE SCREEN ───────────────────────────────────────────────
function renderSchedule() {
  if (!currentAssignments) {
    return `<div style="padding:40px;text-align:center;color:var(--text-muted)">
      No tee sheet generated yet. Go to <strong>Weekly Setup</strong> to generate one.
    </div>`;
  }

  const active = ROSTER.filter(p => !weekly.optOuts[p.name]);
  const TYPE_LABELS = { not_before:'Not before', not_after:'Not after', early:'Early tee time', late:'Late tee time' };

  // Constraint summary
  const absentList = ROSTER.filter(p => weekly.optOuts[p.name]);
  const reqEntries = Object.entries(weekly.specialRequests).filter(([,r]) => r && r.type);

  const absentHtml = absentList.length
    ? absentList.map(p => `<span class="chip chip-absent">${esc(p.name)}</span>`).join('')
    : '<span style="color:var(--text-muted);font-size:12px">None</span>';

  const reqHtml = reqEntries.length
    ? reqEntries.map(([name, req]) => {
        const player = ROSTER.find(r => r.name === name);
        const timeStr = req.time ? ` <strong>${fmtTime(req.time)}</strong>` :
          (req.type === 'not_before' || req.type === 'not_after') ? ' <em style="color:var(--danger)">(⚠ no time entered)</em>' : '';
        const splitStr = req.carpoolSplit && player && player.carpool
          ? ` <em style="color:var(--text-muted)">(travelling separately from CP${player.carpool})</em>` : '';
        return `<div class="constraint-row">
          <span class="constraint-name">${esc(name)}</span>
          <span class="constraint-detail">${TYPE_LABELS[req.type] || req.type}${timeStr}${splitStr}</span>
        </div>`;
      }).join('')
    : '<span style="color:var(--text-muted);font-size:12px">None</span>';

  const splitEntries = Object.entries(weekly.specialRequests).filter(([,r]) => r && r.carpoolSplit);
  const splitHtml = splitEntries.length
    ? splitEntries.map(([name]) => {
        const player = ROSTER.find(r => r.name === name);
        return `<span class="chip chip-split">${esc(name)}${player ? ` (CP${player.carpool})` : ''}</span>`;
      }).join('')
    : '<span style="color:var(--text-muted);font-size:12px">None</span>';

  // Tee slots
  const slotsHtml = currentAssignments.map((slot, si) => {
    const t = TEE_TIMES[slot.si];
    const h = slot.players[0]?.holes || 9;
    const chips = slot.players.map((p, pi) => {
      const isSel = swapSelection && swapSelection.slotIdx === si && swapSelection.playerIdx === pi;
      return `<span class="player-chip${isSel?' swap-selected':''}"
        onclick="handleSwapClick(${si}, ${pi})"
        data-rawname="${escAttr(p.name)}">
        ${p.carpool ? `<span class="cp">CP${p.carpool}</span>` : ''}${esc(p.name)}
      </span>`;
    }).join('');
    // Show empty slot target if a player is selected and this slot has room
    const showEmptyTarget = swapSelection && !swapSelection.empty && slot.players.length < 4
      && swapSelection.slotIdx !== si;
    const emptyTarget = showEmptyTarget
      ? `<span class="slot-empty-target" onclick="handleSwapClick(${si}, -1)">+ move here</span>`
      : '';
    return `
      <div class="tee-slot">
        <div class="slot-time h${h}">
          ${t.label} AM
          <div class="slot-sub">${h} holes · ${slot.players.length} players</div>
        </div>
        <div class="slot-players">${chips}${emptyTarget}</div>
      </div>
    `;
  }).join('');

  const swapHint = swapSelection
    ? `<div class="swap-hint">✋ ${swapSelection.empty ? '' : esc(currentAssignments[swapSelection.slotIdx].players[swapSelection.playerIdx].name) + ' selected — '}click another player to swap, or an empty slot to move · click same player to cancel</div>`
    : `<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:4px 0">Click any player name to select for swapping</div>`;

  return `
    <div class="tee-sheet-header">
      <div>
        <div class="tee-sheet-title">${weekLabel(state.weekNum)} Tee Sheet</div>
        <div class="tee-sheet-sub">${active.length} players · ${currentAssignments.length} tee times</div>
      </div>
      <div class="tee-sheet-actions">
        <button class="btn-ghost dark btn-sm" onclick="doReset()">✕ Reset Week</button>
        <button class="btn-primary btn-sm" onclick="doCommit()">✓ Commit Week</button>
      </div>
    </div>
    <div class="constraint-box">
      <div class="constraint-section">
        <h4>Absent Players (${absentList.length})</h4>
        <div class="constraint-chips">${absentHtml}</div>
      </div>
      <div class="constraint-section">
        <h4>Special Tee Time Requests (${reqEntries.length})</h4>
        ${reqHtml}
      </div>
      <div class="constraint-section">
        <h4>Carpool Splits (${splitEntries.length})</h4>
        <div class="constraint-chips">${splitHtml}</div>
      </div>
    </div>
    ${swapHint}
    <div class="tee-slots">${slotsHtml}</div>
    <div class="commit-note">
      Review the tee sheet above. Click <strong>Commit Week</strong> to record pairings and advance to
      ${weekLabel(state.weekNum + 1)}.
    </div>
  `;
}

// ── RENDER: HISTORY SCREEN ────────────────────────────────────────────────
function renderHistory() {
  const totalPairings  = Object.values(state.pairingHistory).reduce((s, v) => s + v, 0);
  const uniquePairings = Object.keys(state.pairingHistory).length;

  const sorted = Object.entries(state.pairingHistory)
    .sort(([,a],[,b]) => b - a)
    .slice(0, 20);

  const pairsHtml = sorted.length
    ? sorted.map(([key, cnt]) => {
        const cls = cnt >= 3 ? 'c3' : cnt === 2 ? 'c2' : 'c1';
        const [a, b] = key.split('|');
        return `<div class="pair-row">
          <span>${esc(a)} &amp; ${esc(b)}</span>
          <span class="pair-badge ${cls}">${cnt}×</span>
        </div>`;
      }).join('')
    : '<p style="color:var(--text-muted);font-size:13px">No pairing history yet.</p>';

  const weeksHtml = state.weeklyHistory.length
    ? [...state.weeklyHistory].map((w, i) => ({ w, i })).reverse().map(({ w, i }) =>
        `<div class="week-row">
          <span>Week ${w.week}</span>
          <span>${w.date || formatWeekDate(w.week)}</span>
          <span>${w.count} players</span>
          ${w.assignments
? `<span style="display:inline-flex;gap:6px;">
              <button class="btn-ghost dark btn-sm" onclick="downloadTeeSheet(${i})">⬇ CSV</button>
              <button class="btn-ghost dark btn-sm" onclick="copyTeeSheet(${i})">📋 Copy</button>
            </span>`
            : '<span style="color:var(--text-muted);font-size:11px">no data</span>'}
        </div>`
      ).join('')
    : '<p style="color:var(--text-muted);font-size:13px">No weeks committed yet.</p>';

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${state.weekNum - 1}</div><div class="stat-label">Weeks Played</div></div>
      <div class="stat-card"><div class="stat-num">${uniquePairings}</div><div class="stat-label">Unique Pairings</div></div>
      <div class="stat-card"><div class="stat-num">${totalPairings}</div><div class="stat-label">Total Pairings</div></div>
    </div>
    <div class="card">
      <div class="card-header">Week Log</div>
      <div class="card-body">${weeksHtml}</div>
    </div>
    <div class="card">
      <div class="card-header">Most Frequent Pairings</div>
      <div class="card-body">${pairsHtml}</div>
    </div>
  `;
}

// ── SCHEDULING ENGINE ─────────────────────────────────────────────────────
function scheduleWeek() {
  const active    = ROSTER.filter(p => !weekly.optOuts[p.name]);
  const players18 = active.filter(p => p.holes === 18);
  const players9  = active.filter(p => p.holes === 9);

  // Players travelling separately from carpool this week
  const splitSet = new Set(
    Object.entries(weekly.specialRequests)
      .filter(([, r]) => r && r.carpoolSplit)
      .map(([k]) => k)
  );

  // Effective carpool: null if solo or travelling separately
  function effCP(p) {
    return (p.carpool && !splitSet.has(p.name)) ? p.carpool : null;
  }

  // Pairing score: lower = less repeated
  function pairScore(a, b) {
    return state.pairingHistory[[a, b].sort().join('|')] || 0;
  }

  // Compute block slot index arrays
  const n18      = players18.length;
  const nSlots18 = Math.ceil(n18 / 4);
  const slots18  = TEE_TIMES.slice(0, Math.max(nSlots18, 1)).map((_, i) => i);
  const slots9   = TEE_TIMES.slice(slots18.length).map((_, i) => i + slots18.length);

  // Allowed slots for a player given a block's slot array.
  // Returns the subset of blockSlots satisfying the constraint.
  // If the constraint is impossible within the block (empty result),
  // returns the full block — constraint is treated as unsatisfiable.
  function allowedSlots(name, blockSlots) {
    const req = weekly.specialRequests[name];
    if (!req || !req.type) return blockSlots;

    const mins  = blockSlots.map(s => TEE_TIMES[s].mins);
    const bMin  = Math.min(...mins);
    const bMax  = Math.max(...mins);
    const bSpan = bMax - bMin || 1;

    const filtered = blockSlots.filter(s => {
      const m = TEE_TIMES[s].mins;
      if (req.type === 'early')      return m <= bMin + bSpan / 3;
      if (req.type === 'late')       return m >= bMax - bSpan / 3;
      if (req.type === 'not_before' && req.time) {
        const [rh, rm] = req.time.split(':').map(Number);
        return m >= rh * 60 + rm;  // no clamping — if nothing qualifies, falls through
      }
      if (req.type === 'not_after' && req.time) {
        const [rh, rm] = req.time.split(':').map(Number);
        return m <= rh * 60 + rm;  // no clamping
      }
      return true;
    });
    // If constraint is impossible within this block, ignore it (return full block)
    return filtered.length > 0 ? filtered : blockSlots;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Core assignment function — operates on one block at a time.
  // Placement order: constrained solos first, then carpool groups, then free solos.
  // Constrained solos go first so they always get their preferred slot before
  // carpool groups can fill it up.
  function assignBlock(players, blockSlots) {
    if (!players.length || !blockSlots.length) return [];

    // Separate into carpool groups and solos
    const cpMap = {};
    const solos = [];
    for (const p of players) {
      const cp = effCP(p);
      if (cp !== null) { if (!cpMap[cp]) cpMap[cp] = []; cpMap[cp].push(p); }
      else solos.push(p);
    }

    const slots  = blockSlots.map(si => ({ si, players: [] }));
    const slotOf = si => slots.find(s => s.si === si);
    const cap    = sl => 4 - sl.players.length;

    const shuffledSolos = shuffle(solos);
    const constrainedSolos   = shuffledSolos.filter(p => { const r=weekly.specialRequests[p.name]; return r&&r.type; });
    const unconstrainedSolos = shuffledSolos.filter(p => { const r=weekly.specialRequests[p.name]; return !r||!r.type; });

    // ── Step 1: Place constrained solos ──────────────────────────────────
    for (const solo of constrainedSolos) {
      const allowed = allowedSlots(solo.name, blockSlots);
      let best = null, bestScore = Infinity;
      // First try: place within the allowed range
      for (const sl of slots) {
        if (cap(sl) < 1 || !allowed.includes(sl.si)) continue;
        const score = sl.players.reduce((s, p) => s + pairScore(p.name, solo.name), 0);
        if (score < bestScore) { bestScore = score; best = sl; }
      }
      // Fallback: allowed range is full — pick the slot with room whose time
      // is closest to the allowed range (minimises constraint violation)
      if (!best) {
        const allowedMins = allowed.map(si => TEE_TIMES[si].mins);
        const lo = Math.min(...allowedMins), hi = Math.max(...allowedMins);
        let bestDist = Infinity;
        for (const sl of slots) {
          if (cap(sl) < 1) continue;
          const m = TEE_TIMES[sl.si].mins;
          const dist = m < lo ? lo - m : m > hi ? m - hi : 0;
          if (dist < bestDist) { bestDist = dist; best = sl; }
        }
      }
      if (best) best.players.push(solo);
    }

    // ── Step 2: Place carpool groups (constrained groups first, rest shuffled) ──
    // Shuffling unconstrained groups prevents them from always landing in the
    // same slots week after week, which would lock in repeated pairings.
    const sortedCPs = Object.entries(cpMap)
      .map(entry => ({ entry, constrained: entry[1].some(p => { const r=weekly.specialRequests[p.name]; return r&&r.type; }), rand: Math.random() }))
      .sort((a,b) => (b.constrained?1:0)-(a.constrained?1:0) || a.rand-b.rand)
      .map(x => x.entry);

    for (const [, members] of sortedCPs) {
      // Allowed = intersection of all members' allowed ranges
      let allowed = [...blockSlots];
      for (const m of members) {
        const a = allowedSlots(m.name, blockSlots);
        allowed = allowed.filter(si => a.includes(si));
      }
      if (!allowed.length) allowed = [...blockSlots];

      if (members.length === 4) {
        // Must split 2+2 across 2 consecutive slots.
        // Choose the split pairing that minimises repeated pairings this season.
        // There are 3 ways to split 4 into 2+2: [0,1|2,3], [0,2|1,3], [0,3|1,2]
        const splits4 = [
          [0,1,2,3], [0,2,1,3], [0,3,1,2]
        ].map(([a,b,c,d]) => ({
          grp1: [members[a],members[b]],
          grp2: [members[c],members[d]],
          score: pairScore(members[a].name,members[b].name) +
                 pairScore(members[c].name,members[d].name)
        }));
        splits4.sort((a,b) => a.score - b.score);
        const {grp1, grp2} = splits4[0]; // least-repeated split

        let placed = false;
        // Try allowed range first
        for (const si of allowed) {
          const ni = si + 1;
          if (!allowed.includes(ni)) continue;
          const s1=slotOf(si), s2=slotOf(ni);
          if (s1 && s2 && cap(s1)>=2 && cap(s2)>=2) {
            grp1.forEach(p=>s1.players.push(p));
            grp2.forEach(p=>s2.players.push(p));
            placed=true; break;
          }
        }
        if (!placed) {
          // Relax: pick 2 consecutive slots in block closest to allowed range
          const allowedMins4 = allowed.map(si => TEE_TIMES[si].mins);
          const aLo4 = Math.min(...allowedMins4), aHi4 = Math.max(...allowedMins4);
          const pairs4 = [];
          for (const si of blockSlots) {
            const ni=si+1;
            if (!blockSlots.includes(ni)) continue;
            const s1=slotOf(si),s2=slotOf(ni);
            if (s1&&s2&&cap(s1)>=2&&cap(s2)>=2) {
              const m=(TEE_TIMES[si].mins+TEE_TIMES[ni].mins)/2;
              const dist=m<aLo4?aLo4-m:m>aHi4?m-aHi4:0;
              pairs4.push({s1,s2,dist});
            }
          }
          pairs4.sort((a,b)=>a.dist-b.dist);
          if (pairs4.length) {
            const {s1,s2}=pairs4[0];
            grp1.forEach(p=>s1.players.push(p));
            grp2.forEach(p=>s2.players.push(p));
            placed=true;
          }
        }
        if (!placed) {
          // Last resort: greedy fill
          let rem=[...members];
          for (const sl of slots) { while(cap(sl)>0&&rem.length) sl.players.push(rem.shift()); if(!rem.length) break; }
        }
      } else if (members.length === 2) {
        // ── PAIRS POLICY: CP group of 2 — ALWAYS placed in the same slot ──────
        function slotScore(sl, mems) {
          return sl.players.reduce((sum, occ) =>
            sum + mems.reduce((s2, m) => s2 + pairScore(occ.name, m.name), 0), 0);
        }
        let placed = false;
        // Pass 1: best allowed slot with room for both
        {
          const candidates = allowed
            .map(si => slotOf(si))
            .filter(sl => sl && cap(sl) >= 2)
            .sort((a, b) => slotScore(a, members) - slotScore(b, members));
          if (candidates.length) {
            members.forEach(m => candidates[0].players.push(m));
            placed = true;
          }
        }
        // Pass 2: relax — any slot in block with room for both
        if (!placed) {
          const candidates = blockSlots
            .map(si => slotOf(si))
            .filter(sl => sl && cap(sl) >= 2)
            .sort((a, b) => slotScore(a, members) - slotScore(b, members));
          if (candidates.length) {
            members.forEach(m => candidates[0].players.push(m));
            placed = true;
          }
        }
        // Last resort
        if (!placed) {
          let rem = [...members];
          for (const sl of slots) { while(cap(sl)>0&&rem.length) sl.players.push(rem.shift()); if(!rem.length) break; }
        }

      } else {
        // 3+ members: split across 2 consecutive slots when possible
        let placed = false;

        function slotScore(sl, mems) {
          return sl.players.reduce((sum, occ) =>
            sum + mems.reduce((s2, m) => s2 + pairScore(occ.name, m.name), 0), 0);
        }

        {
          const slotPairs = [];
          for (const si of allowed) {
            const ni = si + 1;
            if (!allowed.includes(ni)) continue;
            const s1=slotOf(si), s2=slotOf(ni);
            if (s1 && s2 && cap(s1)>=1 && cap(s2)>=1 && cap(s1)+cap(s2)>=members.length)
              slotPairs.push({s1, s2});
          }
          if (slotPairs.length) {
            let bestScore = Infinity, bestS1 = null, bestS2 = null,
                bestGrp1 = null, bestGrp2 = null;
            function combos(arr, k) {
              if (k === 0) return [[]];
              if (arr.length === k) return [arr.slice()];
              const [first, ...rest] = arr;
              return [...combos(rest, k-1).map(c=>[first,...c]), ...combos(rest, k)];
            }
            for (const {s1, s2} of slotPairs) {
              const size1 = Math.ceil(members.length / 2);
              for (const grp1 of combos(members, size1)) {
                const grp2 = members.filter(m => !grp1.includes(m));
                if (cap(s1) < grp1.length || cap(s2) < grp2.length) continue;
                let score = 0;
                for (let i=0;i<grp1.length;i++)
                  for (let j=i+1;j<grp1.length;j++)
                    score += pairScore(grp1[i].name, grp1[j].name);
                for (let i=0;i<grp2.length;i++)
                  for (let j=i+1;j<grp2.length;j++)
                    score += pairScore(grp2[i].name, grp2[j].name);
                score += slotScore(s1, grp1) + slotScore(s2, grp2);
                if (score < bestScore) {
                  bestScore = score; bestS1 = s1; bestS2 = s2;
                  bestGrp1 = grp1; bestGrp2 = grp2;
                }
              }
            }
            if (bestS1) {
              bestGrp1.forEach(m => bestS1.players.push(m));
              bestGrp2.forEach(m => bestS2.players.push(m));
              placed = true;
            }
          }
        }

        if (!placed) {
          const candidates = allowed
            .map(si => slotOf(si))
            .filter(sl => sl && cap(sl) >= members.length)
            .sort((a, b) => slotScore(a, members) - slotScore(b, members));
          if (candidates.length) {
            members.forEach(m => candidates[0].players.push(m));
            placed = true;
          }
        }

        if (!placed) {
          const slotPairs3 = [];
          for (const si of blockSlots) {
            const ni = si+1;
            if (!blockSlots.includes(ni)) continue;
            const s1=slotOf(si), s2=slotOf(ni);
            if (s1&&s2&&cap(s1)>=1&&cap(s2)>=1&&cap(s1)+cap(s2)>=members.length)
              slotPairs3.push({s1,s2});
          }
          if (slotPairs3.length) {
            function combos3(arr, k) {
              if (k===0) return [[]];
              if (arr.length===k) return [arr.slice()];
              const [first,...rest]=arr;
              return [...combos3(rest,k-1).map(c=>[first,...c]),...combos3(rest,k)];
            }
            const size1=Math.ceil(members.length/2);
            let bestScore=Infinity,bestS1=null,bestS2=null,bestG1=null,bestG2=null;
            for (const {s1,s2} of slotPairs3) {
              for (const grp1 of combos3(members,size1)) {
                const grp2=members.filter(m=>!grp1.includes(m));
                if (cap(s1)<grp1.length||cap(s2)<grp2.length) continue;
                let score=0;
                for (let i=0;i<grp1.length;i++) for (let j=i+1;j<grp1.length;j++) score+=pairScore(grp1[i].name,grp1[j].name);
                for (let i=0;i<grp2.length;i++) for (let j=i+1;j<grp2.length;j++) score+=pairScore(grp2[i].name,grp2[j].name);
                score+=slotScore(s1,grp1)+slotScore(s2,grp2);
                if (score<bestScore){bestScore=score;bestS1=s1;bestS2=s2;bestG1=grp1;bestG2=grp2;}
              }
            }
            if (bestS1) { bestG1.forEach(m=>bestS1.players.push(m)); bestG2.forEach(m=>bestS2.players.push(m)); placed=true; }
          }
        }

        if (!placed) {
          const sl = slots.find(sl => cap(sl) >= members.length);
          if (sl) { members.forEach(m => sl.players.push(m)); placed=true; }
        }

        if (!placed) {
          let rem=[...members];
          for (const sl of slots) { while(cap(sl)>0&&rem.length) sl.players.push(rem.shift()); if(!rem.length) break; }
        }
      }
    }

    // ── Step 3: Place unconstrained solos ─────────────────────────────────
    for (const solo of unconstrainedSolos) {
      let best=null, bestScore=Infinity;
      for (const sl of slots) {
        if (cap(sl)<1) continue;
        const score=sl.players.reduce((s,p)=>s+pairScore(p.name,solo.name),0);
        if (score<bestScore) { bestScore=score; best=sl; }
      }
      if (best) best.players.push(solo);
    }

    // ── Step 4: Post-process 4+2 → 3+3 ──────────────────────────────────
    let swapped = true, guard = 0;
    while (swapped && guard++ < 50) {
      swapped = false;
      const filled = slots.filter(sl => sl.players.length > 0);
      for (const big of filled) {
        if (big.players.length !== 4) continue;
        for (const small of filled) {
          if (small === big || small.players.length !== 2) continue;
          // Find a solo player in big who can move to small
          for (let j = big.players.length - 1; j >= 0; j--) {
            const p = big.players[j];
            if (effCP(p) !== null) continue; // don't break carpool
            const destAllowed = allowedSlots(p.name, blockSlots);
            if (destAllowed.length > 0 && !destAllowed.includes(small.si)) continue;
            small.players.push(big.players.splice(j, 1)[0]);
            swapped = true; break;
          }
          if (swapped) break;
        }
        if (swapped) break;
      }
    }

    // ── Step 4b: Swap over-paired players between slots ─────────────────
    // For each pair of slots, check if swapping a player from one to the other
    // reduces total pairing history score. Repeat until no improvement found.
    // Only swaps solo (non-carpool) players to avoid breaking carpool constraints.
    {
      const filled = slots.filter(sl => sl.players.length >= 2);
      let improved = true;
      let iters = 0;
      while (improved && iters++ < 100) {
        improved = false;
        for (let ai = 0; ai < filled.length && !improved; ai++) {
          for (let bi = ai+1; bi < filled.length && !improved; bi++) {
            const sa = filled[ai], sb = filled[bi];
            // Only swap if sizes are compatible (same size or differ by at most 1
            // and both stay >= 2 after swap)
            if (Math.abs(sa.players.length - sb.players.length) > 1) continue;

            for (let j = 0; j < sa.players.length && !improved; j++) {
              const pa = sa.players[j];
              if (effCP(pa) !== null) continue; // skip carpool members
              const paAllowed = allowedSlots(pa.name, blockSlots);
              if (paAllowed.length > 0 && !paAllowed.includes(sb.si)) continue;

              for (let k = 0; k < sb.players.length && !improved; k++) {
                const pb = sb.players[k];
                if (effCP(pb) !== null) continue;
                const pbAllowed = allowedSlots(pb.name, blockSlots);
                if (pbAllowed.length > 0 && !pbAllowed.includes(sa.si)) continue;

                // Score before swap
                const otherA = sa.players.filter((_,i)=>i!==j);
                const otherB = sb.players.filter((_,i)=>i!==k);
                const before = otherA.reduce((s,p)=>s+pairScore(p.name,pa.name),0)
                             + otherB.reduce((s,p)=>s+pairScore(p.name,pb.name),0);
                // Score after swap (pa goes to sb, pb goes to sa)
                const after  = otherA.reduce((s,p)=>s+pairScore(p.name,pb.name),0)
                             + otherB.reduce((s,p)=>s+pairScore(p.name,pa.name),0);

                if (after < before) {
                  // Do the swap
                  sa.players[j] = pb;
                  sb.players[k] = pa;
                  improved = true;
                }
              }
            }
          }
        }
      }
    }

    // ── Step 5: Merge groups of 1 where possible ────────────────────────
    // If a slot ends up with 1 player, try to move them into a slot that
    // has room (2 or 3 players). Respects time constraints where possible,
    // but relaxes them if no constrained destination exists.
    // Note: if constraints make merging impossible (e.g. all other slots
    // are full), the solo slot is left for the user to adjust manually.
    {
      const filled = slots.filter(sl => sl.players.length > 0);
      for (const soloSlot of filled) {
        if (soloSlot.players.length !== 1) continue;
        const p = soloSlot.players[0];
        // Try constrained destinations first, then any slot with room
        let best = null, bestScore = Infinity;
        for (const dest of filled) {
          if (dest === soloSlot || dest.players.length >= 4) continue;
          const destAllowed = allowedSlots(p.name, blockSlots);
          if (destAllowed.length > 0 && !destAllowed.includes(dest.si)) continue;
          const score = dest.players.reduce((s, q) => s + pairScore(p.name, q.name), 0);
          if (score < bestScore) { bestScore = score; best = dest; }
        }
        if (!best) {
          // Relax constraint — just find any slot with room
          best = filled.find(d => d !== soloSlot && d.players.length < 4);
        }
        if (best) best.players.push(soloSlot.players.pop());
        // If still no room anywhere, leave it — the user can adjust manually
      }
    }

    return slots.filter(sl => sl.players.length > 0);
  }

  const result18 = assignBlock(players18, slots18);
  const result9  = assignBlock(players9,  slots9);
  return [...result18, ...result9];
}

// ── SWAP LOGIC ───────────────────────────────────────────────────────────────
function handleSwapClick(slotIdx, playerIdx) {
  // playerIdx === -1 means "move to empty space in this slot"
  if (!swapSelection) {
    // Nothing selected yet — select this player
    if (playerIdx === -1) return; // can't select an empty target as first click
    swapSelection = { slotIdx, playerIdx };
    render();
    return;
  }

  // Something already selected
  const { slotIdx: selSi, playerIdx: selPi } = swapSelection;

  // Clicking the same player deselects
  if (selSi === slotIdx && selPi === playerIdx) {
    swapSelection = null;
    render();
    return;
  }

  // Clicking another player in the same slot — reselect
  if (selSi === slotIdx && playerIdx !== -1) {
    swapSelection = { slotIdx, playerIdx };
    render();
    return;
  }

  // Execute the move/swap
  const selPlayer = currentAssignments[selSi].players[selPi];

  if (playerIdx === -1) {
    // Move selected player to empty space in target slot
    doMovePlayer(selSi, selPi, slotIdx);
  } else {
    // Swap two players
    const tgtPlayer = currentAssignments[slotIdx].players[playerIdx];
    doSwapPlayers(selSi, selPi, slotIdx, playerIdx, selPlayer, tgtPlayer);
  }
}

function carpoolWarning(p1, p2, fromSi, toSi) {
  // Returns a warning string if either player is breaking out of their carpool group
  const warnings = [];
  // Check if p1's carpool partners are all in fromSi — moving p1 away splits them
  if (p1.carpool) {
    const partnersInFrom = currentAssignments[fromSi].players
      .filter(p => p !== p1 && p.carpool === p1.carpool);
    if (partnersInFrom.length > 0)
      warnings.push(`${p1.name} is in CP${p1.carpool} with ${partnersInFrom.map(p=>p.name).join(', ')} in that slot`);
  }
  if (p2 && p2.carpool) {
    const partnersInTo = currentAssignments[toSi].players
      .filter(p => p !== p2 && p.carpool === p2.carpool);
    if (partnersInTo.length > 0)
      warnings.push(`${p2.name} is in CP${p2.carpool} with ${partnersInTo.map(p=>p.name).join(', ')} in that slot`);
  }
  return warnings;
}

function doSwapPlayers(si1, pi1, si2, pi2, p1, p2) {
  const warnings = [
    ...carpoolWarning(p1, p2, si1, si2),
    ...carpoolWarning(p2, p1, si2, si1)
  ];
  if (warnings.length) {
    const msg = 'Carpool warning:\n' + warnings.join('\n') + '\n\nSwap anyway?';
    if (!confirm(msg)) { swapSelection = null; render(); return; }
  }
  // Do the swap
  currentAssignments[si1].players[pi1] = p2;
  currentAssignments[si2].players[pi2] = p1;
  swapSelection = null;
  render();
}

function doMovePlayer(fromSi, fromPi, toSi) {
  const p = currentAssignments[fromSi].players[fromPi];
  const warnings = carpoolWarning(p, null, fromSi, toSi);
  if (warnings.length) {
    const msg = 'Carpool warning:\n' + warnings.join('\n') + '\n\nMove anyway?';
    if (!confirm(msg)) { swapSelection = null; render(); return; }
  }
  // Move player: remove from source, add to destination
  currentAssignments[fromSi].players.splice(fromPi, 1);
  currentAssignments[toSi].players.push(p);
  // If source slot is now empty, remove it from assignments
  if (currentAssignments[fromSi].players.length === 0) {
    currentAssignments.splice(fromSi, 1);
  }
  swapSelection = null;
  render();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function doGenerate() {
  swapSelection = null;
  if (!ROSTER.length) { showToast('Please upload a roster first'); return; }
  try {
    currentAssignments = scheduleWeek();
    showScreen('schedule');
  } catch(e) {
    console.error('Schedule error:', e);
    alert('Error generating tee sheet: ' + e.message);
  }
}

function doRegenerate() {
  try {
    currentAssignments = scheduleWeek();
    render();
  } catch(e) {
    console.error('Schedule error:', e);
    alert('Error regenerating: ' + e.message);
  }
}

function doReset() {
  swapSelection = null;
  if (confirm('Reset this week? All absences and requests will be cleared. Season history is untouched.')) {
    weekly = { optOuts: {}, specialRequests: {} };
    currentAssignments = null;
    expandedPlayer = null;
    saveToStorage();
    showScreen('setup');
    showToast('Week reset.');
  }
}

function doCommit() {
  if (!currentAssignments) return;
  if (!confirm(`Commit ${weekLabel(state.weekNum)} and advance to ${weekLabel(state.weekNum + 1)}?`)) return;

  // Record all pairings
  for (const slot of currentAssignments) {
    const ps = slot.players;
    for (let i = 0; i < ps.length; i++)
      for (let j = i + 1; j < ps.length; j++) {
        const key = [ps[i].name, ps[j].name].sort().join('|');
        state.pairingHistory[key] = (state.pairingHistory[key] || 0) + 1;
      }
  }
  // Build constraint snapshot for the downloadable tee sheet
  const reqSnap = {};
  for (const [name, req] of Object.entries(weekly.specialRequests)) {
    if (req && req.type) reqSnap[name] = { ...req };
  }
  state.weeklyHistory.push({
    week:        state.weekNum,
    date:        formatWeekDate(state.weekNum),
    count:       ROSTER.filter(p => !weekly.optOuts[p.name]).length,
    absent:      Object.keys(weekly.optOuts).filter(n => weekly.optOuts[n]),
    requests:    reqSnap,
    assignments: currentAssignments.map(sl => ({
      si: sl.si,
      players: sl.players.map(p => ({ name: p.name, holes: p.holes, carpool: p.carpool }))
    }))
  });
  state.weekNum++;

  // Load pre-entered future week data if available, else start fresh
  const pre = (state.futureWeeks || {})[state.weekNum];
  weekly = pre ? { optOuts: { ...(pre.optOuts||{}) }, specialRequests: { ...(pre.specialRequests||{}) } }
               : { optOuts: {}, specialRequests: {} };
  // Remove the now-current week from futureWeeks
  if (state.futureWeeks) delete state.futureWeeks[state.weekNum];
  currentAssignments = null;
  expandedPlayer = null;
  saveToStorage();
  showScreen('setup');
}

function addNewPlayer() {
  const nameRaw  = document.getElementById('newPlayerName').value.trim();
  const holesVal = document.querySelector('input[name="newPlayerHoles"]:checked')?.value;
  const cpRaw    = document.getElementById('newPlayerCarpool').value.trim();

  if (!nameRaw) { showToast('Please enter a name'); return; }
  const name  = cleanName(nameRaw);
  const holes = parseInt(holesVal) === 18 ? 18 : 9;
  const cp    = cpRaw ? (parseInt(cpRaw) || null) : null;

  // Check for duplicate
  if (ROSTER.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    showToast('A player with that name already exists'); return;
  }

  const newPlayer = { name, holes, carpool: cp };
  // Write only to customRoster — then rebuild ROSTER from it to avoid duplicates
  if (!state.customRoster) state.customRoster = [...ROSTER];
  state.customRoster.push(newPlayer);
  restoreCustomRoster();

  document.querySelector('.modal-overlay')?.remove();
  currentAssignments = null;
  saveToStorage();
  render();
  showToast(`${name} added to roster`);
}

// ── ROSTER UPLOAD ─────────────────────────────────────────────────────────
function uploadRoster(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
      // Skip header row if it starts with "Name" (case-insensitive)
      const start = lines[0].toLowerCase().startsWith('name') ? 1 : 0;
      const newRoster = [];
      for (let i = start; i < lines.length; i++) {
        const parts = lines[i].split(',').map(s => s.trim());
        if (parts.length < 2 || !parts[0]) continue;
        const name   = cleanName(parts[0]);
        const holes  = parseInt(parts[1]) === 18 ? 18 : 9;
        const cp     = parts[2] ? (parseInt(parts[2]) || null) : null;
        newRoster.push({ name, holes, carpool: cp });
      }
      if (newRoster.length < 2) { showToast('CSV too short — check format'); return; }
      if (!confirm(`Replace roster with ${newRoster.length} players from "${file.name}"?\nThis will clear the current week. Season history is kept.`)) return;
      ROSTER_RAW = newRoster;
      ROSTER     = newRoster; // already cleaned above
      weekly     = { optOuts: {}, specialRequests: {} };
      currentAssignments = null;
      expandedPlayer = null;
      // Save custom roster into state so it persists
      state.customRoster = newRoster;
      saveToStorage();
      showScreen('setup');
      showToast(`Roster updated: ${newRoster.length} players`);
    } catch(err) { showToast('Error reading CSV: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function downloadCurrentRoster() {
  const fullRoster = state.customRoster && state.customRoster.length
    ? state.customRoster : ROSTER;
  if (!fullRoster.length) { showToast('No roster to download'); return; }
  const rows = ['Name,Holes,Carpool,Status'];
  for (const p of fullRoster) {
    rows.push(`${p.name},${p.holes},${p.carpool || ''},${p.deleted ? 'Inactive' : 'Active'}`);
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });

  document.body.appendChild(a);
  a.download = 'golf-league-roster.csv';
  a.click();
  document.body.removeChild(a);
  showToast('Roster downloaded');
}

// ── TEE SHEET DOWNLOAD ────────────────────────────────────────────────────
function downloadTeeSheet(weekIndex) {
  const w = state.weeklyHistory[weekIndex];
  if (!w || !w.assignments) { showToast('No tee sheet data for this week'); return; }

  const TYPE_LABELS = { early:'Early', late:'Late', not_before:'Not Before', not_after:'Not After' };
  const rows = [];

  // Title row
  rows.push([`${weekLabel(w.week)} Tee Sheet`, '', '']);

  // Header row
  rows.push(['Time', 'Holes', 'Players']);

  // Tee time rows — first player on same row as time, rest stacked below
  for (const slot of w.assignments) {
    const t = TEE_TIMES[slot.si];
    const names = slot.players.map(p => p.name + (p.carpool ? ` (CP${p.carpool})` : ''));
    rows.push([t.label + ' AM', slot.players[0]?.holes || '', names[0] || '']);
    for (let i = 1; i < names.length; i++) rows.push(['', '', names[i]]);
  }

  // Blank separator
  rows.push(['', '', '']);

  // Constraints section
  rows.push([`${weekLabel(w.week)} — Constraint Summary`, '', '']);
  rows.push(['ABSENT PLAYERS', '', '']);
  if (w.absent && w.absent.length) {
    for (const name of w.absent) rows.push(['', name, '']);
  } else {
    rows.push(['', 'None', '']);
  }
  rows.push(['', '', '']);
  rows.push(['SPECIAL TIME REQUESTS', '', '']);
  const reqs = Object.entries(w.requests || {});
  if (reqs.length) {
    rows.push(['Player', 'Request', 'Time', 'Carpool Split']);
    for (const [name, req] of reqs) {
      rows.push([
        name,
        TYPE_LABELS[req.type] || req.type,
        req.time ? req.time + ' AM' : '',
        req.carpoolSplit ? 'Yes — travelling separately' : ''
      ]);
    }
  } else {
    rows.push(['', 'None', '', '']);
  }

  // Convert to CSV
  const csv = rows.map(row =>
    row.map(cell => {
      const s = String(cell);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `golf-league-${dateSlug(w.week)}-teesheet.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast(`Week ${w.week} tee sheet downloaded (CSV)`);
}

// ── COPY TEE SHEET TO CLIPBOARD ──────────────────────────────────────────
function copyTeeSheet(weekIndex) {
  const w = state.weeklyHistory[weekIndex];
  if (!w || !w.assignments) { showToast('No tee sheet data for this week'); return; }

  // Build a clean HTML table suitable for pasting into Mailchimp
  const tableStyle = 'border-collapse:collapse;font-family:Arial,sans-serif;font-size:14px;';
  const thStyle    = 'border:1px solid #999;padding:6px 12px;text-align:center;background:#e8f0eb;font-weight:bold;';
  const tdStyle    = 'border:1px solid #999;padding:6px 12px;text-align:center;';
  const titleStyle = 'border:1px solid #999;padding:8px 12px;text-align:center;font-weight:bold;font-size:16px;background:#e8f0eb;';

  let html = `<table style="${tableStyle}">`;

  // Title row
  html += `<tr><td colspan="3" style="${titleStyle}">${weekLabel(w.week)} Tee Sheet</td></tr>`;

  // Header row
  html += `<tr>
    <th style="${thStyle}">Time</th>
    <th style="${thStyle}">Holes</th>
    <th style="${thStyle}">Players</th>
  </tr>`;

  // Tee time rows
  for (const slot of w.assignments) {
    const t = TEE_TIMES[slot.si];
    const names = slot.players.map(p => p.name + (p.carpool ? ` (CP${p.carpool})` : ''));
    html += `<tr>
      <td style="${tdStyle}">${t.label} AM</td>
      <td style="${tdStyle}">${slot.players[0]?.holes || ''}</td>
      <td style="${tdStyle}">${names[0] || ''}</td>
    </tr>`;
    for (let i = 1; i < names.length; i++) {
      html += `<tr>
        <td style="${tdStyle}"></td>
        <td style="${tdStyle}"></td>
        <td style="${tdStyle}">${names[i]}</td>
      </tr>`;
    }
  }
  html += '</table>';

  // Use clipboard API with both HTML and plain-text fallback
  const plainText = w.assignments.map(slot => {
    const t = TEE_TIMES[slot.si];
    const names = slot.players.map(p => p.name + (p.carpool ? ` (CP${p.carpool})` : ''));
    return `${t.label} AM  |  ${slot.players[0]?.holes || ''}  |  ${names.join(', ')}`;
  }).join('\n');

  try {
    const htmlBlob  = new Blob([html],      { type: 'text/html' });
    const textBlob  = new Blob([plainText], { type: 'text/plain' });
    const item      = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
    navigator.clipboard.write([item]).then(() => {
      showToast('Tee sheet copied — paste into Mailchimp!');
    }).catch(() => {
      // Fallback: plain text only
      navigator.clipboard.writeText(plainText).then(() => {
        showToast('Copied as plain text (HTML not supported in this browser)');
      });
    });
  } catch(e) {
    // Last resort fallback
    navigator.clipboard.writeText(plainText).then(() => {
      showToast('Copied as plain text');
    });
  }
}
